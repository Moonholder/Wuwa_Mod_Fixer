name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Get version
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src-ui

      - name: Generate Tauri icons
        run: npx tauri icon src-tauri/icons/icon.png

      - name: Build Tauri app (Windows)
        run: npx tauri build

      - name: Upload unsigned binaries for signing
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-binaries
          path: target/release/Wuwa_Mod_Fixer.exe
          retention-days: 1

      - name: Sign binaries with SignPath
        id: signpath
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ vars.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: 'Wuwa_Mod_Fixer'
          signing-policy-slug: 'test-signing'
          github-artifact-id: '${{ steps.upload-unsigned.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: './signed-artifacts'

      - name: Rename and package
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.version }}"
          $src = "signed-artifacts/Wuwa_Mod_Fixer.exe"
          $dst = "Wuwa_Mod_Fixer_v${version}.exe"
          Copy-Item $src $dst
          Compress-Archive -Path $dst -DestinationPath "Wuwa_Mod_Fixer_v${version}_x86_64-pc-windows-msvc.zip" -Force

      - name: Upload Windows release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            ./Wuwa_Mod_Fixer_v${{ steps.get_version.outputs.version }}.exe
            ./Wuwa_Mod_Fixer_v${{ steps.get_version.outputs.version }}_x86_64-pc-windows-msvc.zip

  build-linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Get version
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src-ui

      - name: Generate Tauri icons
        run: npx tauri icon src-tauri/icons/icon.png

      - name: Build Tauri app (Linux)
        run: npx tauri build

      - name: Prepare portable tar.gz
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          mkdir -p release_linux

          cp target/release/Wuwa_Mod_Fixer release_linux/Wuwa_Mod_Fixer
          chmod +x release_linux/Wuwa_Mod_Fixer

          mkdir -p release_linux/icons
          cp src-tauri/icons/32x32.png release_linux/icons/32x32.png
          cp src-tauri/icons/128x128.png release_linux/icons/128x128.png
          cp src-tauri/icons/128x128@2x.png release_linux/icons/256x256.png
          cp src-tauri/icons/icon.png release_linux/icons/512x512.png

          SCRIPT=release_linux/add_desktop_icon.sh
          echo '#!/bin/bash' > "$SCRIPT"
          echo 'DIR="$( cd "$( dirname "${BASH_SOURCE[0]}" )" && pwd )"' >> "$SCRIPT"
          
          echo 'DESKTOP_FILE="$HOME/.local/share/applications/com.moonholder.wuwa-mod-fixer.desktop"' >> "$SCRIPT"
          echo 'mkdir -p "$HOME/.local/share/applications"' >> "$SCRIPT"
          echo '' >> "$SCRIPT"
          
          echo '# install icon at multiple sizes for crisp display' >> "$SCRIPT"
          echo 'mkdir -p "$HOME/.local/share/icons/hicolor/32x32/apps"' >> "$SCRIPT"
          echo 'mkdir -p "$HOME/.local/share/icons/hicolor/128x128/apps"' >> "$SCRIPT"
          echo 'mkdir -p "$HOME/.local/share/icons/hicolor/256x256/apps"' >> "$SCRIPT"
          echo 'mkdir -p "$HOME/.local/share/icons/hicolor/512x512/apps"' >> "$SCRIPT"
          echo '' >> "$SCRIPT"
          echo 'cp "$DIR/icons/32x32.png" "$HOME/.local/share/icons/hicolor/32x32/apps/com.moonholder.wuwa-mod-fixer.png" 2>/dev/null || true' >> "$SCRIPT"
          echo 'cp "$DIR/icons/128x128.png" "$HOME/.local/share/icons/hicolor/128x128/apps/com.moonholder.wuwa-mod-fixer.png" 2>/dev/null || true' >> "$SCRIPT"
          echo 'cp "$DIR/icons/256x256.png" "$HOME/.local/share/icons/hicolor/256x256/apps/com.moonholder.wuwa-mod-fixer.png" 2>/dev/null || true' >> "$SCRIPT"
          echo 'cp "$DIR/icons/512x512.png" "$HOME/.local/share/icons/hicolor/512x512/apps/com.moonholder.wuwa-mod-fixer.png" 2>/dev/null || true' >> "$SCRIPT"
          echo '' >> "$SCRIPT"
          echo 'gtk-update-icon-cache -f -t "$HOME/.local/share/icons/hicolor" 2>/dev/null || true' >> "$SCRIPT"
          echo '' >> "$SCRIPT"
          echo 'cat > "$DESKTOP_FILE" << INNEOF' >> "$SCRIPT"
          echo '[Desktop Entry]' >> "$SCRIPT"
          echo 'Name=WWMI Mod Fixer' >> "$SCRIPT"
          echo 'Comment=WWMI Mod Fix Tool' >> "$SCRIPT"
          echo 'Exec="$DIR/Wuwa_Mod_Fixer"' >> "$SCRIPT"
          echo 'Icon=com.moonholder.wuwa-mod-fixer' >> "$SCRIPT"
          echo 'Terminal=false' >> "$SCRIPT"
          echo 'Type=Application' >> "$SCRIPT"
          echo 'Categories=Utility;Game;' >> "$SCRIPT"
          echo 'StartupWMClass=com.moonholder.wuwa-mod-fixer' >> "$SCRIPT"
          echo 'INNEOF' >> "$SCRIPT"
          echo '' >> "$SCRIPT"
          echo 'chmod +x "$DESKTOP_FILE"' >> "$SCRIPT"
          echo 'echo "================================================="' >> "$SCRIPT"
          echo 'echo " Successfully added WWMI Mod Fixer to system menu!"' >> "$SCRIPT"
          echo 'echo " You can now press the Super/Windows key to search"' >> "$SCRIPT"
          echo 'echo " for the app and launch it directly."' >> "$SCRIPT"
          echo 'echo " (Shortcut saved to: $DESKTOP_FILE)"' >> "$SCRIPT"
          echo 'echo "================================================="' >> "$SCRIPT"
          echo 'read -p "Press Enter to exit..."' >> "$SCRIPT"
          chmod +x "$SCRIPT"

          tar -czf ./Wuwa_Mod_Fixer_v${VERSION}_x86_64-unknown-linux-gnu.tar.gz -C release_linux .

      - name: Upload Linux release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            ./Wuwa_Mod_Fixer_v${{ steps.get_version.outputs.version }}_x86_64-unknown-linux-gnu.tar.gz

  generate-update-json:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ github.ref_name }} --dir release_assets

      - name: Generate update.json
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          WIN_EXE="Wuwa_Mod_Fixer_v${VERSION}.exe"
          LINUX_TGZ="Wuwa_Mod_Fixer_v${VERSION}_x86_64-unknown-linux-gnu.tar.gz"

          WIN_SHA256=$(sha256sum "release_assets/$WIN_EXE" | awk '{print $1}')
          WIN_SIZE=$(stat -c%s "release_assets/$WIN_EXE")
          LINUX_SHA256=$(sha256sum "release_assets/$LINUX_TGZ" | awk '{print $1}')
          LINUX_SIZE=$(stat -c%s "release_assets/$LINUX_TGZ")
          
          # Extract min_required_version from config.json
          MIN_REQ=$(jq -r '.version.min_required_version' config.json)
          if [[ ! "$MIN_REQ" == v* ]]; then MIN_REQ="v$MIN_REQ"; fi

          jq -n \
            --arg version "v$VERSION" \
            --arg min_req "$MIN_REQ" \
            --arg pub_date "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --arg win_url "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${WIN_EXE}" \
            --arg win_sha "$WIN_SHA256" \
            --argjson win_size "$WIN_SIZE" \
            --arg linux_url "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${LINUX_TGZ}" \
            --arg linux_sha "$LINUX_SHA256" \
            --argjson linux_size "$LINUX_SIZE" \
            --slurpfile notes release_notes.json \
            '{
              version: $version,
              notes: $notes[0],
              pub_date: $pub_date,
              min_required_version: $min_req,
              platforms: {
                "windows-x86_64": {
                  url: $win_url,
                  size: $win_size,
                  sha256: $win_sha
                },
                "linux-x86_64": {
                  url: $linux_url,
                  size: $linux_size,
                  sha256: $linux_sha
                }
              }
            }' > update.json

      - name: Upload update.json
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          files: update.json