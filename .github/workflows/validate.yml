name: Compile & Commit Configuration

on:
  push:
    paths:
      - 'config.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node dependencies
        run: npm ci

      - name: Compile config.yml to config.json
        run: node scripts/compile_config.js

      - name: Commit and push compiled config.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add config.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: auto-compile config.yml to config.json [skip ci]"
            git push
          else
            echo "No changes in config.json. Skipping commit."
          fi

